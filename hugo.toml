baseurl = "https://the-code-labz.github.io/terminal-hugo/"
languageCode = "en-us"
theme = "terminal"
pagination.pagerSize = 5

# Required for Chroma and the custom syntax highlighting.
[markup.highlight]
  noClasses = false

[params]
  contentTypeName = "posts"
  showMenuItems = 3
  showLanguageSelector = false
  fullWidthTheme = false
  centerTheme = true
  autoCover = true
  showLastUpdated = true
  enableGitInfo = true

[languages]
  [languages.en]
    languageName = "English"
    title = "NeuroClaw"

    [languages.en.params]
      subtitle = "Insights from the NeuroClaw AI ecosystem"
      owner = "The Code Labz"
      keywords = "NeuroClaw, AI, agents, automation, knowledge"
      copyright = "© 2026 The Code Labz"
      menuMore = "More"
      readMore = "Read more"
      readOtherPosts = "More posts"
      newerPosts = "Newer"
      olderPosts = "Older"
      missingContentMessage = "Page not found..."
      missingBackButtonLabel = "Back to home"
      minuteReadingTime = "min read"
      words = "words"

      [languages.en.params.logo]
        logoText = "NeuroClaw"
        logoHomeLink = "/"

      [languages.en.menu]
        [[languages.en.menu.main]]
          identifier = "wiki"
          name = "Wiki"
          url = "/posts"
        [[languages.en.menu.main]]
          identifier = "about"
          name = "About"
          url = "/about"
        [[languages.en.menu.main]]
          identifier = "tags"
          name = "Tags"
          url = "/tags"
